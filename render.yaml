services:
  - type: web
    name: accessory-ims
    env: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn accessory_ims.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DEBUG
        value: False
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: accessory-ims-db
          property: connectionString
      - key: MEDIA_ROOT
        value: /data/media
      - key: ALLOWED_HOSTS
        value: .onrender.com
    disk:
      name: media-storage
      mountPath: /data
      sizeGb: 5

databases:
  - name: accessory-ims-db
    plan: free
